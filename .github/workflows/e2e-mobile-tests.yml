name: SyncTune Android App Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Run Appium E2E Tests on Physical Device
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Start Local Backend API Server
        shell: pwsh
        run: |
          cd backend/node-api
          npm install
          Start-Process -FilePath "node" -ArgumentList "server.js" -NoNewWindow

      - name: Start Appium Server
        shell: pwsh
        run: |
          Start-Process -FilePath "npx" -ArgumentList "appium", "--allow-insecure=uiautomator2:chromedriver_autodownload" -NoNewWindow
          Start-Sleep -Seconds 5

      - name: Run Appium Mobile Tests
        shell: pwsh
        run: |
          cd tests/mobile-tests
          npm install
          node runner.js

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-reports
          path: tests/mobile-tests/reports/
          retention-days: 7
