name: SyncTune Android App Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Run Appium E2E Tests on Physical Device
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Start Servers (Backend & Appium)
        shell: powershell
        run: |
          # Prevent runner from killing background processes when this step completes
          $env:RUNNER_TRACKING_ID=""
          
          # Start Node API Backend
          Write-Host "Starting local backend API server..."
          cd backend/node-api
          npm install
          Start-Process -FilePath "node" -ArgumentList "server.js" -NoNewWindow
          cd ../..
          
          # Start Appium Server
          Write-Host "Starting Appium server..."
          Start-Process -FilePath "npx.cmd" -ArgumentList "appium", "--allow-insecure=uiautomator2:chromedriver_autodownload" -NoNewWindow
          
          # Allow some time for servers to boot up
          Start-Sleep -Seconds 12

      - name: Verify Servers are Reachable
        shell: powershell
        run: |
          Write-Host "Checking port 5000 (Backend)..."
          Test-NetConnection -Port 5000 -ComputerName localhost
          
          Write-Host "Checking port 4723 (Appium)..."
          Test-NetConnection -Port 4723 -ComputerName localhost

      - name: Run Appium Mobile Tests
        shell: powershell
        run: |
          cd tests/mobile-tests
          npm install
          node runner.js

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-reports
          path: tests/mobile-tests/reports/
          retention-days: 7
