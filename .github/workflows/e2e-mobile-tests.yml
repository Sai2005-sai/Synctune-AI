name: SyncTune Android App Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/expo-app/package.json

      - name: Install Expo App Dependencies
        run: |
          cd frontend/expo-app
          npm install

      - name: Build Android Debug APK
        run: |
          cd frontend/expo-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend/expo-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
