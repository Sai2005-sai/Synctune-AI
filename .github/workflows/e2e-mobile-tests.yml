name: SyncTune Android App Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test on Physical Device
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Expo App Dependencies
        run: |
          cd frontend/expo-app
          npm install

      - name: Run Android Instrumented Tests
        run: |
          cd frontend/expo-app/android
          .\gradlew.bat connectedAndroidTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            frontend/expo-app/android/app/build/reports/androidTests/connected/
            frontend/expo-app/android/app/build/outputs/androidTest-results/connected/
          retention-days: 7
