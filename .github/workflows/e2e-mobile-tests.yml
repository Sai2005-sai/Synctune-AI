name: Mobile E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Mobile E2E Test Suite
    runs-on: macos-13 # Required for hardware acceleration (emulator running)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            backend/node-api/package.json
            tests/package.json

      - name: Install Global Appium & Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install Backend API Dependencies
        run: |
          cd backend/node-api
          npm install

      - name: Start Node.js API Server
        run: |
          cd backend/node-api
          node server.js &
        # Keep running in the background

      - name: Install E2E Testing Suite Dependencies
        run: |
          cd tests
          npm install

      - name: Run E2E Tests inside Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Check connected devices
            adb devices
            
            # Start Appium server in the background
            appium --allow-insecure=uiautomator2:chromedriver_autodownload &
            
            # Wait a few seconds for Appium server to warm up
            sleep 5
            
            # Execute mobile test suite runner
            cd tests/mobile-tests
            node runner.js

      - name: Upload E2E Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-mobile-test-reports
          path: |
            tests/mobile-tests/reports/
            tests/mobile-tests/screenshots/
