name: SyncTune Android App Build & Test
# Triggered by jaswanthreddykunuturu

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Run Appium E2E Tests on Physical Device
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Start Servers (Backend & Appium)
        shell: powershell
        run: |
          # Install backend dependencies
          Write-Host "Installing backend dependencies..."
          cd backend/node-api
          npm install
          cd ../..
          
          # Resolve absolute directories
          $backendDir = (Resolve-Path "backend/node-api").Path
          $appiumDir = (Resolve-Path ".").Path
          
          # Start Node API Backend using WMI
          Write-Host "Starting local backend API server via WMI..."
          Invoke-CimMethod -ClassName Win32_Process -MethodName Create -Arguments @{
            CommandLine = "node server.js"
            CurrentDirectory = $backendDir
          }
          
          # Start Appium Server using WMI
          Write-Host "Starting Appium server via WMI..."
          Invoke-CimMethod -ClassName Win32_Process -MethodName Create -Arguments @{
            CommandLine = "npx.cmd appium --allow-insecure=uiautomator2:chromedriver_autodownload"
            CurrentDirectory = $appiumDir
          }
          
          # Allow some time for servers to boot up
          Start-Sleep -Seconds 15

      - name: Verify Servers are Reachable
        shell: powershell
        run: |
          Write-Host "Checking port 5000 (Backend)..."
          $backendTest = Test-NetConnection -Port 5000 -ComputerName localhost
          if (-not $backendTest.TcpTestSucceeded) {
            throw "Backend on port 5000 is not reachable!"
          }
          Write-Host "✅ Backend is online!"
          
          Write-Host "Checking port 4723 (Appium)..."
          $appiumTest = Test-NetConnection -Port 4723 -ComputerName localhost
          if (-not $appiumTest.TcpTestSucceeded) {
            throw "Appium on port 4723 is not reachable!"
          }
          Write-Host "✅ Appium is online!"

      - name: Build and Install Capacitor Android App
        shell: powershell
        run: |
          # Build Web Assets
          Write-Host "Building Capacitor Web assets..."
          cd frontend/capacitor-app
          npm install
          $env:VITE_CAPACITOR="true"
          npm run build
          
          # Sync to Android
          Write-Host "Syncing to Android project..."
          npx cap sync android
          
          # Compile APK
          Write-Host "Compiling APK..."
          cd android
          .\gradlew.bat assembleDebug
          
          # Reinstall on connected physical device
          Write-Host "Reinstalling latest APK on connected phone..."
          adb install -r app/build/outputs/apk/debug/app-debug.apk

      - name: Run Appium Mobile Tests
        shell: powershell
        run: |
          cd tests/mobile-tests
          npm install
          node runner.js

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-reports
          path: tests/mobile-tests/reports/
          retention-days: 7
